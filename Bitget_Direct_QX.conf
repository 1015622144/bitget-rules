# ==============================================================
#   Bitget 国内直连分流规则 (Quantumult X)
#   适用版本：Quantumult X 1.0.30+
#   更新日期：2026-05-21
#   说明：将 Bitget 相关域名全部走 DIRECT（直连），
#         无需代理即可访问 Bitget 交易所（国内镜像/直连地址）
# ==============================================================
#
# 使用方式：
#   方式一（推荐）：将本文件放到可访问的 URL，然后在 QX 配置中的
#                  [filter_remote] 区块添加一行远程规则订阅。
#   方式二：将 [filter_local] 部分的内容复制粘贴到你的 QX 配置文件
#           的 [filter_local] 区块中。
#
# ==============================================================

[filter_local]

# ──────────────────────────────────────────────
#  Bitget 主站及备用域名
# ──────────────────────────────────────────────
host-suffix, bitget.com, direct
host-suffix, bitget.site, direct
host-suffix, bitgetnz.com, direct
host-suffix, bitgetglobal.com, direct

# ──────────────────────────────────────────────
#  Bitget 原 BitKeep 钱包域名（已合并品牌）
# ──────────────────────────────────────────────
host-suffix, bitkeep.com, direct
host-suffix, bitkeep.site, direct

# ──────────────────────────────────────────────
#  Bitget REST API
# ──────────────────────────────────────────────
host, api.bitget.com, direct
host, api.bitget.site, direct
host, capi.bitget.com, direct

# ──────────────────────────────────────────────
#  Bitget WebSocket
# ──────────────────────────────────────────────
host, wss.bitget.com, direct
host, ws.bitget.com, direct

# ──────────────────────────────────────────────
#  Bitget CDN & 静态资源
# ──────────────────────────────────────────────
host-suffix, bitget-cdn.com, direct
host-suffix, bitgetimg.com, direct
host-suffix, bimg.cc, direct
host, static.bitget.com, direct
host, images.bitget.com, direct
host, cdn.bitget.com, direct

# ──────────────────────────────────────────────
#  Bitget 帮助中心 & 公告
# ──────────────────────────────────────────────
host-suffix, bitget.zendesk.com, direct

# ──────────────────────────────────────────────
#  Bitget 下载 & 推广链接
# ──────────────────────────────────────────────
host, s.bitget.com, direct
host, dl.bitget.com, direct

# ──────────────────────────────────────────────
#  关键词兜底（捕获可能遗漏的 Bitget 子域名）
#  注意：此规则粒度较粗，如与其他规则冲突可注释掉
# ──────────────────────────────────────────────
# host-keyword, bitget, direct
